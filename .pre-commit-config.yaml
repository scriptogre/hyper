repos:
  - repo: local
    hooks:
      - id: cargo-fmt
        name: cargo fmt
        entry: cargo fmt --manifest-path rust/Cargo.toml --check
        language: system
        types: [rust]
        pass_filenames: false
      - id: cargo-clippy
        name: cargo clippy
        entry: cargo clippy --manifest-path rust/Cargo.toml -- -D warnings
        language: system
        types: [rust]
        pass_filenames: false
      - id: cargo-test
        name: cargo test
        entry: cargo test --manifest-path rust/Cargo.toml
        language: system
        types: [rust]
        pass_filenames: false
      - id: pytest
        name: pytest
        entry: uv run pytest
        language: system
        always_run: true
        pass_filenames: false
